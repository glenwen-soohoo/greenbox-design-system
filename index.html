<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenBox Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    color: #1a1a1a;
    background: #fafbfb;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }

  .topbar {
    padding: 20px 32px;
    border-bottom: 1px solid #e0e4e6;
    background: #fff;
  }
  .topbar .brand {
    font-weight: 700;
    color: #4ba83b;
    font-size: 18px;
    letter-spacing: 0.02em;
  }
  .topbar .brand small {
    font-size: 11px;
    color: #999;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-left: 6px;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 64px 32px;
  }

  .container {
    max-width: 880px;
    width: 100%;
    text-align: center;
  }

  h1 {
    font-size: clamp(32px, 4.5vw, 44px);
    font-weight: 700;
    color: #008000;
    margin-bottom: 16px;
    line-height: 1.3;
  }

  .lead {
    font-size: 16px;
    color: #595757;
    margin-bottom: 64px;
    line-height: 1.85;
  }

  .groups {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    text-align: left;
  }

  .group h2 {
    font-size: 14px;
    color: #4ba83b;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .group .group-name {
    font-size: 22px;
    font-weight: 700;
    color: #008000;
    margin-bottom: 24px;
  }

  .btn-stack {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border: 1px solid #e0e4e6;
    border-radius: 4px;
    padding: 18px 24px;
    font-size: 16px;
    font-weight: 500;
    color: #1a1a1a;
    transition: all 0.15s;
  }
  .btn:hover {
    border-color: #4ba83b;
    color: #4ba83b;
    box-shadow: 0 4px 12px rgba(75, 168, 59, 0.08);
    transform: translateY(-1px);
  }
  .btn .arrow {
    font-size: 18px;
    color: #999;
    transition: transform 0.15s;
  }
  .btn:hover .arrow {
    color: #4ba83b;
    transform: translateX(2px);
  }

  footer {
    text-align: center;
    padding: 32px;
    font-size: 13px;
    color: #999;
    border-top: 1px solid #e0e4e6;
    background: #fff;
  }
  footer a { color: #595757; }
  footer a:hover { color: #4ba83b; }

  .tools-section {
    margin-top: 64px;
    padding-top: 40px;
    border-top: 1px solid #e0e4e6;
    text-align: left;
  }
  .tools-section h2 {
    font-size: 14px;
    color: #999;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .tools-section .btn-tool {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    background: #fff;
    border: 1px dashed #ccc;
    border-radius: 4px;
    color: #595757;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .tools-section .btn-tool:hover {
    border-color: #4ba83b;
    border-style: solid;
    color: #4ba83b;
  }
  .tools-section .btn-tool .ico { font-size: 16px; }

  @media (max-width: 768px) {
    main { padding: 40px 20px; }
    .groups { grid-template-columns: 1fr; gap: 32px; }
    .lead { margin-bottom: 40px; }
    .tools-section { margin-top: 40px; padding-top: 24px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">GreenBox Design System <small>v1</small></div>
</header>

<main>
  <div class="container">
    <h1>GreenBox Design System</h1>
    <p class="lead">無毒農 v1 兩方案決策樣本——選一個進入瀏覽。每個頁面上方有切換 bar，可以快速跳到其他方案。</p>

    <div class="groups">
      <div class="group">
        <h2>Plan A</h2>
        <div class="group-name">踏實版</div>
        <div class="btn-stack">
          <a class="btn" href="plan-a/preview.html">
            <span>方案 A · 規範總覽</span>
            <span class="arrow">→</span>
          </a>
          <a class="btn" href="plan-a/sample1.html">
            <span>方案 A · 範例 1</span>
            <span class="arrow">→</span>
          </a>
          <a class="btn" href="plan-a/sample2.html">
            <span>方案 A · 範例 2</span>
            <span class="arrow">→</span>
          </a>
        </div>
      </div>

      <div class="group">
        <h2>Plan D</h2>
        <div class="group-name">精煉版</div>
        <div class="btn-stack">
          <a class="btn" href="plan-d/preview.html">
            <span>方案 D · 規範總覽</span>
            <span class="arrow">→</span>
          </a>
          <a class="btn" href="plan-d/sample1.html">
            <span>方案 D · 範例 1</span>
            <span class="arrow">→</span>
          </a>
          <a class="btn" href="plan-d/sample2.html">
            <span>方案 D · 範例 2</span>
            <span class="arrow">→</span>
          </a>
        </div>
      </div>
    </div>

    <div class="tools-section">
      <h2>Tools</h2>
      <a class="btn-tool" href="tools/font-weight.html">
        <span class="ico">🔤</span>
        <span>字體粗細測試（設計自行調）</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>
</main>

<footer>
  © 2026 GreenBox · <a href="https://github.com/glenwen-soohoo/greenbox-design-system" target="_blank" rel="noopener">View on GitHub</a>
</footer>

</body>
</html>
